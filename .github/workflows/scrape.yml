name: Scrape GTA Weekly Deals

on:
  schedule:
    # Runs every Wednesday at 6am UTC (GTA weekly reset is Wednesday ~5am EDT)
    - cron: '0 6 * * 3'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py data.json

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update weekly deals data"
          git push
